<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="sidenav">
<div class="sidenav-menu">
<!-- Brand Logo -->
<a class="logo" th:href="@{/}">
<span class="logo logo-light">
<span class="logo-lg"><img alt="logo" th:src="@{/images/logo.png}"/></span>
<span class="logo-sm"><img alt="small logo" th:src="@{/images/logo-sm.png}"/></span>
</span>
<span class="logo logo-dark">
<span class="logo-lg"><img alt="dark logo" th:src="@{/images/logo-black.png}"/></span>
<span class="logo-sm"><img alt="small logo" th:src="@{/images/logo-sm.png}"/></span>
</span>
</a>
<!-- Sidebar Hover Menu Toggle Button -->
<button class="button-on-hover">
<span class="btn-on-hover-icon"></span>
</button>
<!-- Full Sidebar Menu Close Button -->
<button class="button-close-offcanvas">
<i class="ti ti-menu-4 align-middle"></i>
</button>
<div class="scrollbar" data-simplebar="">
<div class="sidenav-user" id="user-profile-settings" th:style="|background: url(@{/images/user-bg-pattern.svg})|">
<div class="d-flex justify-content-between align-items-center">
<div>
<a class="link-reset" href="#!">
<img alt="user-image" class="rounded-circle mb-2 avatar-md" th:src="@{/images/users/user-1.jpg}"/>
<span class="sidenav-user-name fw-bold">Damian D.</span>
<span class="fs-12 fw-semibold" data-lang="user-role">Art Director</span>
</a>
</div>
<div>
<a aria-expanded="false" aria-haspopup="false" class="dropdown-toggle drop-arrow-none link-reset sidenav-user-set-icon" data-bs-offset="0,12" data-bs-toggle="dropdown" href="#!">
<i class="ti ti-settings fs-24 align-middle ms-1"></i>
</a>
<div class="dropdown-menu">
<!-- Header -->
<div class="dropdown-header noti-title">
<h6 class="text-overflow m-0">Welcome back!</h6>
</div>
<!-- My Profile -->
<a class="dropdown-item" href="#!">
<i class="ti ti-user-circle me-1 fs-lg align-middle"></i>
<span class="align-middle">Profile</span>
</a>
<!-- Settings -->
<a class="dropdown-item" href="javascript:void(0);">
<i class="ti ti-settings-2 me-1 fs-lg align-middle"></i>
<span class="align-middle">Account Settings</span>
</a>
<!-- Lock -->
<a class="dropdown-item" th:href="@{/auth/lock-screen}">
<i class="ti ti-lock me-1 fs-lg align-middle"></i>
<span class="align-middle">Lock Screen</span>
</a>
<!-- Logout -->
<a class="dropdown-item text-danger fw-semibold" href="javascript:void(0);" onclick="doLogout()">
<i class="ti ti-logout me-1 fs-lg align-middle"></i>
<span class="align-middle">Log Out</span>
</a>
</div>
</div>
</div>
</div>
<!--- Sidenav Menu -->
<div id="sidenav-menu">
<ul class="side-nav">

    <th:block th:each="module : ${sidenavModules}">

        <!--
            하위 메뉴가 있는 모듈
            - 접이식(collapsible) 링크 + sub-menu 렌더링
            - 현재 URI가 하위 메뉴 중 하나와 일치하면 자동 펼침(show) 및 active 표시
        -->
        <li class="side-nav-item" th:if="${not #lists.isEmpty(module.menus())}">
            <th:block th:with="isActive=${module.menus().![url()].contains(currentUri)}">
            <a class="side-nav-link"
               th:classappend="${isActive} ? 'active'"
               data-bs-toggle="collapse"
               th:href="'#menu-' + ${module.id()}"
               th:attr="aria-controls='menu-' + ${module.id()}, aria-expanded=${isActive}">
                <span class="menu-icon" th:if="${not #strings.isEmpty(module.icon())}">
                    <i th:class="${module.icon()}"></i>
                </span>
                <span class="menu-text" th:text="${module.name()}"></span>
                <span class="menu-arrow"></span>
            </a>
            <div class="collapse"
                 th:id="'menu-' + ${module.id()}"
                 th:classappend="${isActive} ? 'show'">
                <ul class="sub-menu">
                    <li class="side-nav-item" th:each="menu : ${module.menus()}">
                        <a class="side-nav-link"
                           th:classappend="${menu.url() != null and menu.url() == currentUri} ? 'active'"
                           th:href="${menu.url()} ?: '#'">
                            <span class="menu-icon" th:if="${not #strings.isEmpty(menu.icon())}">
                                <i th:class="${menu.icon()}"></i>
                            </span>
                            <span class="menu-text" th:text="${menu.name()}"></span>
                        </a>
                    </li>
                </ul>
            </div>
            </th:block>
        </li>

        <!--
            하위 메뉴가 없는 모듈
            - 모듈 URL로 직접 이동하는 단순 링크
        -->
        <li class="side-nav-item" th:if="${#lists.isEmpty(module.menus())}">
            <a class="side-nav-link"
               th:classappend="${module.url() != null and module.url() == currentUri} ? 'active'"
               th:href="${module.url()} ?: '#'">
                <span class="menu-icon" th:if="${not #strings.isEmpty(module.icon())}">
                    <i th:class="${module.icon()}"></i>
                </span>
                <span class="menu-text" th:text="${module.name()}"></span>
            </a>
        </li>

    </th:block>

    <!-- 메뉴 데이터가 없을 때 (미인증 또는 권한 없음) -->
    <li class="side-nav-item" th:if="${#lists.isEmpty(sidenavModules)}">
        <span class="side-nav-link text-muted">접근 가능한 메뉴가 없습니다.</span>
    </li>

</ul>
</div>
</div>
</div>
<!-- Sidenav Menu End -->

</th:block>
</html>
