<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{shared/base(title=${'Apex Area Charts'})}" >

<th:block layout:fragment="styles">

</th:block>

<th:block layout:fragment="content">
<!-- Begin page -->
<div class="wrapper">
<th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block> <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>
<!-- ============================================================== -->
<!-- Start Page Content here -->
<!-- ============================================================== -->
<div class="content-page">
<div class="container-fluid">
<th:block th:replace="~{shared/partials/page-title :: page-title(subtitle='Charts', title='Area Apexchart')}"></th:block>
<div class="row">
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title">Basic Area Chart</h4>
</div>
<div class="card-body">
<div dir="ltr">
<div class="apex-charts" id="basic-area"></div>
</div>
</div>
<!-- end card body-->
</div>
<!-- end card -->
</div>
<!-- end col-->
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title">Spline Area</h4>
</div>
<div class="card-body">
<div dir="ltr">
<div class="apex-charts" id="spline-area"></div>
</div>
</div>
<!-- end card body-->
</div>
<!-- end card -->
</div>
<!-- end col-->
</div>
<!-- end row-->
<div class="row">
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title">Area Chart - Datetime X-axis</h4>
</div>
<div class="card-body">
<div class="toolbar apex-toolbar">
<button class="btn btn-sm btn-light" data-range="1M">1M</button>
<button class="btn btn-sm btn-light" data-range="6M">6M</button>
<button class="btn btn-sm btn-light active" data-range="1Y">1Y</button>
<button class="btn btn-sm btn-light" data-range="YTD">YTD</button>
<button class="btn btn-sm btn-light" data-range="ALL">ALL</button>
</div>
<div dir="ltr">
<div class="apex-charts" id="area-chart-datetime"></div>
</div>
</div>
<!-- end card body-->
</div>
<!-- end card -->
</div>
<!-- end col-->
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title">Area with Negative Values</h4>
</div>
<div class="card-body">
<div dir="ltr">
<div class="apex-charts" id="area-chart-negative"></div>
</div>
</div>
<!-- end card body-->
</div>
<!-- end card -->
</div>
<!-- end col-->
</div>
<!-- end row-->
<div class="row">
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title">Selection - Github Style</h4>
</div>
<div class="card-body">
<div dir="ltr">
<div class="apex-charts" id="area-chart-github"></div>
<div class="pt-2 pb-1">
<div class="d-flex justify-content-center align-items-center gap-2">
<img alt="file-image" class="avatar-sm rounded" th:src="@{/images/logo-sm.png}"/>
<a class="text-muted fw-bold fs-md" href="javascript:void(0);">Inspinia</a>
</div>
</div>
<div class="apex-charts" id="area-chart-github2"></div>
</div>
</div>
<!-- end card body-->
</div>
<!-- end card -->
</div>
<!-- end col-->
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title">Stacked Area</h4>
</div>
<div class="card-body">
<div dir="ltr">
<div class="apex-charts" id="stacked-area"></div>
</div>
</div>
<!-- end card body-->
</div>
<!-- end card -->
</div>
<!-- end col-->
</div>
<!-- end row-->
<div class="row">
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title">Irregular TimeSeries</h4>
</div>
<div class="card-body">
<div dir="ltr">
<div class="apex-charts" id="area-timeSeries"></div>
</div>
</div>
<!-- end card body-->
</div>
<!-- end card -->
</div>
<!-- end col-->
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title">Area Chart with Null values</h4>
</div>
<div class="card-body">
<div dir="ltr">
<div class="apex-charts" id="area-chart-nullvalues"></div>
</div>
</div>
<!-- end card body-->
</div>
<!-- end card -->
</div>
<!-- end col-->
</div>
<!-- end row-->
</div>
<!-- container -->
<th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
</div>
<!-- ============================================================== -->
<!-- End Page content -->
<!-- ============================================================== -->
</div>
<!-- END wrapper -->
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block> <th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
<!-- Apex Charts js -->
<!-- Apex Chart Area Demo js -->
</th:block>

<th:block layout:fragment="scripts">
<script th:src="@{/plugins/apexcharts/apexcharts.min.js}"></script>
<script th:src="@{/plugins/moment/moment.min.js}"></script>
<script src="https://apexcharts.com/samples/assets/github-data.js"></script>
<script src="https://apexcharts.com/samples/assets/irregular-data-series.js"></script>
<script th:src="@{/js/pages/chart-apex-area.js}"></script>
</th:block>

</html>
