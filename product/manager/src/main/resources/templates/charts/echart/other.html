<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{shared/base(title=${'Echart Other Chart'})}" >

<th:block layout:fragment="styles">

</th:block>

<th:block layout:fragment="content">
<!-- Begin page -->
<div class="wrapper">
<th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block> <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>
<!-- ============================================================== -->
<!-- Start Main Content -->
<!-- ============================================================== -->
<div class="content-page">
<div class="container-fluid">
<th:block th:replace="~{shared/partials/page-title :: page-title(subtitle='Charts', title='Other Echart')}"></th:block>
<div class="row">
<div class="col-xl-6">
<div class="card">
<div class="card-header border-0">
<h4 class="card-title mb-0">Pictorialbar Dotted Chart</h4>
</div>
<div class="card-body p-2 pt-0">
<div class="rounded-3 overflow-hidden" id="echart-pictorialbar-dotted" style="min-height: 400px"></div>
</div>
</div>
<!-- end card -->
</div>
<!-- end col -->
<div class="col-xl-6">
<div class="card">
<div class="card-header">
<h4 class="card-title mb-0">Basic Sunburst Chart</h4>
</div>
<div class="card-body p-2 pt-0">
<div id="echar-basic-sunburst" style="min-height: 399px"></div>
</div>
</div>
<!-- end card -->
</div>
<!-- end col -->
<div class="col-xl-12">
<div class="card">
<div class="card-header">
<h4 class="card-title mb-0">Nested Pie Chart</h4>
</div>
<div class="card-body">
<div id="chart-pie-nest" style="min-height: 600px"></div>
</div>
</div>
<!-- end card -->
</div>
<!-- end col -->
</div>
<!-- end row -->
</div>
<!-- container -->
<th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
</div>
<!-- ============================================================== -->
<!-- End of Main Content -->
<!-- ============================================================== -->
</div>
<!-- END wrapper -->
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block> <th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
<!-- E Charts js -->
<!-- E Charts Demo js -->
</th:block>

<th:block layout:fragment="scripts">
<script th:src="@{/plugins/echarts/echarts.min.js}"></script>
<script th:src="@{/js/pages/chart-echart-other.js}"></script>
</th:block>

</html>
