<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{shared/base(title=${'Scrollable Layout'})}" data-layout-position="scrollable">

<th:block layout:fragment="styles">

</th:block>

<th:block layout:fragment="content">
<!-- Begin page -->
<div class="wrapper">
<th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block> <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>
<!-- ============================================================== -->
<!-- Start Main Content -->
<!-- ============================================================== -->
<div class="content-page">
<div class="container-fluid">
<th:block th:replace="~{shared/partials/page-title :: page-title(subtitle='Layouts', title='Scrollable')}"></th:block>
<div class="row">
<div class="col-12">
<div class="alert alert-info alert-bordered border-start border-info d-flex align-items-start gap-2">
<i class="ti ti-info-circle fs-xxl"></i>
<div>
                                    To enable full scrolling and view all content, please add
                                    <code>data-layout-position="scrollable"</code>
                                    to the
                                    <code>&lt;html&gt;</code>
                                    tag.
                                </div>
</div>
</div>
</div>
<div style="min-height: 100vh"></div>
</div>
<!-- container -->
<th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
</div>
<!-- ============================================================== -->
<!-- End of Main Content -->
<!-- ============================================================== -->
</div>
<!-- END wrapper -->
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block> <th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">

</th:block>

</html>
