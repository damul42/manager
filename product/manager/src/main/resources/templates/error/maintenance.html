<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{shared/base(title=${'Maintenance'})}" >

<th:block layout:fragment="styles">

</th:block>

<th:block layout:fragment="content">
<div class="auth-box d-flex align-items-center">
<div class="container-xxl">
<div class="row align-items-center justify-content-center">
<div class="col-xl-6">
<div class="card mb-0 rounded-4">
<div class="card-body">
<div class="auth-brand text-center mb-0">
<a class="logo-dark" th:href="@{/}">
<img alt="dark logo" th:src="@{/images/logo-black.png}"/>
</a>
<a class="logo-light" th:href="@{/}">
<img alt="logo" th:src="@{/images/logo.png}"/>
</a>
</div>
<div class="p-2 text-center">
<div class="w-md-50 mx-auto">
<img alt="Maintenance" class="img-fluid" th:src="@{/images/maintenance.svg}"/>
</div>
<h3 class="fw-bold text-uppercase">Site Under Maintenance</h3>
<p class="text-muted">
                                        We’re currently performing scheduled maintenance.
                                        <br/>
                                        Please check back soon.
                                    </p>
<button class="btn btn-primary mt-3 rounded-pill me-1">Call Now</button>
<button class="btn btn-info mt-3 rounded-pill">Email Us</button>
</div>
<p class="text-center text-muted mt-5 mb-0">
                                    ©
                                    
                                    Inspinia — by
                                    <span class="fw-bold">WebAppLayers</span>
</p>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- end auth-fluid-->
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script>
                                        document.write(new Date().getFullYear())
                                    </script>
</th:block>

</html>
