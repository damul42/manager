<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shared/base(title=${'역할 수정'})}">

<th:block layout:fragment="content">
<div class="wrapper">
    <th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block>
    <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>

    <div class="content-page">
        <div class="container-fluid">
            <th:block th:replace="~{shared/partials/page-title :: page-title(subtitle='역할', title='역할 수정')}"></th:block>

            <!-- 툴바 -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a class="btn btn-sm btn-outline-secondary" id="btn-back">
                    <i class="ti ti-arrow-left me-1"></i>상세
                </a>
                <button class="btn btn-sm btn-outline-danger" id="btn-delete" type="button">
                    <i class="ti ti-trash me-1"></i>삭제
                </button>
            </div>

            <!-- 로딩 -->
            <div id="page-loading" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>

            <!-- 편집 영역 -->
            <div id="page-content" style="display:none;">

                <!-- 역할 기본 정보 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0"><i class="ti ti-shield me-1"></i>역할 정보</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="f-name">역할명 <span class="text-danger">*</span></label>
                                <input class="form-control" id="f-name" type="text" placeholder="역할명을 입력하세요."/>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="f-remark">비고</label>
                                <textarea class="form-control" id="f-remark" rows="2" placeholder="비고를 입력하세요."></textarea>
                            </div>
                        </div>

                        <!-- 등록/수정 메타 -->
                        <div class="row mt-3 pt-3 border-top g-2 text-muted small">
                            <div class="col-md-6">등록일: <span id="d-reg-date">—</span></div>
                            <div class="col-md-6">수정일: <span id="d-upt-date">—</span></div>
                        </div>
                    </div>
                </div>

                <!-- 권한 설정 -->
                <div class="card mb-4">
                    <div class="card-header py-2 d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0"><i class="ti ti-lock me-1"></i>권한 설정</h5>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-outline-secondary lh-1" id="btn-check-all" type="button">전체 선택</button>
                            <button class="btn btn-sm btn-outline-secondary lh-1" id="btn-uncheck-all" type="button">전체 해제</button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm align-middle mb-0">
                                <thead class="table-light text-uppercase fs-xxs">
                                    <tr>
                                        <th>모듈 / 메뉴</th>
                                        <th class="text-center" style="width:80px">관리자</th>
                                        <th class="text-center" style="width:80px">목록</th>
                                        <th class="text-center" style="width:80px">조회</th>
                                        <th class="text-center" style="width:80px">입력/수정</th>
                                    </tr>
                                </thead>
                                <tbody id="perm-tbody"></tbody>
                            </table>
                        </div>
                        <div id="perm-empty" class="text-center py-3 text-muted small" style="display:none;">
                            활성화된 모듈이 없습니다.
                        </div>
                    </div>
                </div>

                <!-- 저장/취소 버튼 -->
                <div class="d-flex justify-content-between">
                    <button class="btn btn-outline-secondary" id="btn-cancel" type="button">
                        <i class="ti ti-x me-1"></i>취소
                    </button>
                    <button class="btn btn-primary" id="btn-save" type="button">
                        <i class="ti ti-device-floppy me-1"></i>저장
                    </button>
                </div>

            </div><!-- /page-content -->

        </div>
        <th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
    </div>
</div>
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block>
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script th:src="@{/js/axios.min.js}"></script>
<script th:inline="javascript">
(function () {
    'use strict';

    const roleId = /*[[${roleId}]]*/ '';

    document.getElementById('btn-back').href = `/role/${roleId}`;
    document.getElementById('btn-cancel').addEventListener('click', () => location.href = `/role/${roleId}`);

    // ── 데이터 로드 ────────────────────────────────────────────────────
    Promise.all([
        axios.get(`/api/roles/${roleId}`),
        axios.get('/api/modules/with-menus')
    ])
    .then(([roleRes, moduleRes]) => {
        populate(roleRes.data);
        renderPermTree(moduleRes.data, roleRes.data.settings || []);
    })
    .catch(() => alert('데이터를 불러오지 못했습니다.'))
    .finally(() => {
        document.getElementById('page-loading').style.display = 'none';
        document.getElementById('page-content').style.display = '';
    });

    function populate(d) {
        document.getElementById('f-name').value   = d.name   || '';
        document.getElementById('f-remark').value = d.remark || '';
        document.getElementById('d-reg-date').textContent = fmtDate(d.regDate);
        document.getElementById('d-upt-date').textContent = fmtDate(d.uptDate);
    }

    function renderPermTree(modules, settings) {
        const tbody = document.getElementById('perm-tbody');
        const empty = document.getElementById('perm-empty');
        tbody.innerHTML = '';

        // 저장된 설정을 moduleId|menuId 키로 인덱싱 (menu-level만 사용)
        const settingMap = {};
        settings.forEach(s => {
            const key = s.moduleId + '|' + (s.menuId || '');
            settingMap[key] = s;
        });

        if (!modules || modules.length === 0) {
            empty.style.display = '';
            return;
        }

        modules.forEach(mod => {
            const hasMenus = mod.menus && mod.menus.length > 0;
            if (hasMenus) {
                // 모듈 행: 파생값 표시 (메뉴 권한 OR 합산)
                tbody.appendChild(makeModuleRowDerived(mod));
                mod.menus.forEach(menu => {
                    const setting = settingMap[mod.id + '|' + menu.id] || null;
                    tbody.appendChild(makeMenuRow(mod.id, menu, setting));
                });
                updateDerived(mod.id);
            } else {
                // 모듈 행: 직접 체크박스
                const setting = settingMap[mod.id + '|'] || null;
                tbody.appendChild(makeModuleRowEditable(mod, setting));
            }
        });
    }

    // 메뉴 있는 모듈 행: 파생값 배지
    function makeModuleRowDerived(mod) {
        const tr = document.createElement('tr');
        tr.className = 'table-light';
        tr.dataset.moduleId = mod.id;
        tr.dataset.menuId   = '';
        tr.dataset.hasMenus = 'true';
        const iconHtml = mod.icon ? `<i class="${esc(mod.icon)} me-1"></i>` : '<i class="ti ti-puzzle me-1"></i>';
        tr.innerHTML = `
            <td><strong>${iconHtml}${esc(mod.name)}</strong>
                <span class="ms-2 text-muted small fst-italic">메뉴별 설정</span></td>
            ${derivedCells(mod.id)}`;
        return tr;
    }

    // 메뉴 없는 모듈 행: 직접 체크박스
    function makeModuleRowEditable(mod, setting) {
        const tr = document.createElement('tr');
        tr.className = 'table-light';
        tr.dataset.moduleId = mod.id;
        tr.dataset.menuId   = '';
        tr.dataset.hasMenus = 'false';
        const iconHtml = mod.icon ? `<i class="${esc(mod.icon)} me-1"></i>` : '<i class="ti ti-puzzle me-1"></i>';
        tr.innerHTML = `
            <td><strong>${iconHtml}${esc(mod.name)}</strong></td>
            ${checkboxCells(setting)}`;
        return tr;
    }

    // 메뉴 행: 체크박스 + 변경 시 모듈 파생값 갱신
    function makeMenuRow(moduleId, menu, setting) {
        const tr = document.createElement('tr');
        tr.dataset.moduleId = moduleId;
        tr.dataset.menuId   = menu.id;
        const iconHtml = menu.icon ? `<i class="${esc(menu.icon)} me-1 text-muted"></i>` : '';
        tr.innerHTML = `
            <td class="ps-4"><i class="ti ti-corner-down-right me-1 text-muted"></i>${iconHtml}${esc(menu.name)}</td>
            ${checkboxCells(setting)}`;
        tr.querySelectorAll('input[type=checkbox]').forEach(cb => {
            cb.addEventListener('change', () => updateDerived(moduleId));
        });
        return tr;
    }

    function checkboxCells(setting) {
        return ['admin','list','read','write'].map(n => {
            const checked = setting && setting[n] === 'Y' ? ' checked' : '';
            return `<td class="text-center"><input type="checkbox" name="${n}" class="form-check-input"${checked}></td>`;
        }).join('');
    }

    function derivedCells(moduleId) {
        return ['admin','list','read','write'].map(n =>
            `<td class="text-center" data-derived="${n}" data-for-module="${moduleId}">` +
            `<span class="badge badge-soft-secondary text-muted">N</span></td>`
        ).join('');
    }

    // 해당 모듈의 메뉴 체크박스 OR 합산 → 파생 배지 갱신
    function updateDerived(moduleId) {
        const menuRows = document.querySelectorAll(
            `#perm-tbody tr[data-module-id="${moduleId}"][data-menu-id]:not([data-menu-id=""])`
        );
        const perms = { admin: false, list: false, read: false, write: false };
        menuRows.forEach(tr => {
            ['admin','list','read','write'].forEach(n => {
                if (tr.querySelector(`[name=${n}]`)?.checked) perms[n] = true;
            });
        });
        ['admin','list','read','write'].forEach(n => {
            const cell = document.querySelector(
                `#perm-tbody td[data-derived="${n}"][data-for-module="${moduleId}"]`
            );
            if (cell) {
                cell.innerHTML = perms[n]
                    ? '<span class="badge badge-soft-success">Y</span>'
                    : '<span class="badge badge-soft-secondary text-muted">N</span>';
            }
        });
    }

    // ── 전체 선택/해제 ─────────────────────────────────────────────────
    document.getElementById('btn-check-all').addEventListener('click', () => {
        document.querySelectorAll('#perm-tbody input[type=checkbox]').forEach(cb => {
            cb.checked = true;
            cb.dispatchEvent(new Event('change'));
        });
    });
    document.getElementById('btn-uncheck-all').addEventListener('click', () => {
        document.querySelectorAll('#perm-tbody input[type=checkbox]').forEach(cb => {
            cb.checked = false;
            cb.dispatchEvent(new Event('change'));
        });
    });

    // ── 저장 ──────────────────────────────────────────────────────────
    document.getElementById('btn-save').addEventListener('click', () => {
        const name   = document.getElementById('f-name').value.trim();
        const remark = document.getElementById('f-remark').value.trim() || null;

        if (!name) { alert('역할명을 입력하세요.'); return; }

        const settings = collectSettings();

        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...';

        axios.put(`/api/roles/${roleId}`, { name, remark, settings })
            .then(res => {
                document.getElementById('d-upt-date').textContent = fmtDate(res.data.uptDate);
                alert('저장되었습니다.');
            })
            .catch(err => {
                const msg = err.response?.data?.message
                         || err.response?.data?.errors?.[0]?.defaultMessage
                         || '저장에 실패했습니다.';
                alert(msg);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="ti ti-device-floppy me-1"></i>저장';
            });
    });

    // ── 삭제 ──────────────────────────────────────────────────────────
    document.getElementById('btn-delete').addEventListener('click', () => {
        if (!confirm('해당 역할을 삭제하시겠습니까? 사용자에게 부여된 역할도 함께 해제됩니다.')) return;
        axios.delete(`/api/roles/${roleId}`)
            .then(() => location.href = '/role/list')
            .catch(err => alert(err.response?.data?.message || '삭제에 실패했습니다.'));
    });

    // ── 유틸 ──────────────────────────────────────────────────────────
    function collectSettings() {
        return Array.from(document.querySelectorAll('#perm-tbody tr')).flatMap(tr => {
            // 메뉴가 있는 모듈 행은 파생값이므로 저장 제외
            if (tr.dataset.hasMenus === 'true' && tr.dataset.menuId === '') return [];
            const moduleId = tr.dataset.moduleId;
            const menuId   = tr.dataset.menuId || null;
            const admin = tr.querySelector('[name=admin]').checked ? 'Y' : 'N';
            const list  = tr.querySelector('[name=list]').checked  ? 'Y' : 'N';
            const read  = tr.querySelector('[name=read]').checked  ? 'Y' : 'N';
            const write = tr.querySelector('[name=write]').checked ? 'Y' : 'N';
            if ([admin, list, read, write].some(v => v === 'Y')) {
                return [{ moduleId, menuId, admin, list, read, write }];
            }
            return [];
        });
    }

    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtDate(s) {
        if (!s || s.length < 8) return s || '—';
        const d = s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8);
        return s.length >= 14
            ? d + ' ' + s.slice(8,10) + ':' + s.slice(10,12) + ':' + s.slice(12,14)
            : d;
    }
})();
</script>
</th:block>

</html>
