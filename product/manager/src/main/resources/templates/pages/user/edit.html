<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shared/base(title=${'사용자 수정'})}">

<th:block layout:fragment="content">
<div class="wrapper">
    <th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block>
    <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>

    <div class="content-page">
        <div class="container-fluid">
            <th:block th:replace="~{shared/partials/page-title :: page-title(subtitle='사용자', title='사용자 수정')}"></th:block>

            <!-- 로딩 -->
            <div id="page-loading" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>

            <div id="page-content" style="display:none;">
                <div class="row justify-content-center">
                    <div class="col-lg-7">

                        <!-- 기본 정보 수정 -->
                        <div class="card mb-3">
                            <div class="card-header">
                                <h5 class="card-title mb-0"><i class="ti ti-user-edit me-1"></i>기본 정보</h5>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label text-muted">이메일 (변경 불가)</label>
                                    <input class="form-control bg-light" id="f-email" type="email" readonly/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" for="f-name">이름</label>
                                    <input class="form-control" id="f-name" type="text"
                                           placeholder="표시 이름 (직원 연동 시 직원 이름 우선)"/>
                                    <div class="form-text">직원이 연결된 경우 직원 이름이 우선 표시됩니다.</div>
                                </div>
                                <div class="mb-0">
                                    <label class="form-label" for="f-status">상태</label>
                                    <select class="form-select" id="f-status">
                                        <option value="E">활성</option>
                                        <option value="D">비활성</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- 비밀번호 변경 -->
                        <div class="card mb-3">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="card-title mb-0"><i class="ti ti-lock me-1"></i>비밀번호 변경</h5>
                                <small class="text-muted">입력하지 않으면 변경하지 않습니다.</small>
                            </div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label class="form-label" for="f-new-pw">새 비밀번호</label>
                                    <div class="input-group">
                                        <input class="form-control" id="f-new-pw" type="password"
                                               placeholder="8자 이상" autocomplete="new-password"/>
                                        <button class="btn btn-outline-secondary" type="button" id="btn-toggle-pw">
                                            <i class="ti ti-eye"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="mb-0">
                                    <label class="form-label" for="f-confirm-pw">비밀번호 확인</label>
                                    <input class="form-control" id="f-confirm-pw" type="password"
                                           placeholder="새 비밀번호 재입력" autocomplete="new-password"/>
                                    <div id="pw-mismatch" class="text-danger small mt-1" style="display:none;">
                                        비밀번호가 일치하지 않습니다.
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 역할 설정 -->
                        <div class="card mb-3">
                            <div class="card-header py-2">
                                <h5 class="card-title mb-0"><i class="ti ti-shield me-1"></i>역할 설정</h5>
                            </div>
                            <div class="card-body">
                                <div id="roles-loading" class="text-center py-2">
                                    <div class="spinner-border spinner-border-sm text-primary"></div>
                                </div>
                                <div id="roles-content" style="display:none;">
                                    <div id="roles-list" class="row g-2"></div>
                                    <p id="roles-empty" class="text-muted small mb-0" style="display:none;">
                                        등록된 역할이 없습니다. 역할을 먼저 등록해 주세요.
                                    </p>
                                </div>
                            </div>
                        </div>

                        <!-- 직원 연동 정보 (읽기 전용) -->
                        <div class="card mb-4" id="emp-card" style="display:none;">
                            <div class="card-header">
                                <h5 class="card-title mb-0">
                                    <i class="ti ti-id-badge me-1"></i>연결된 직원
                                    <span class="badge badge-soft-primary ms-1">연동됨</span>
                                </h5>
                            </div>
                            <div class="card-body">
                                <dl class="row mb-0">
                                    <dt class="col-4 text-muted fw-normal">사번</dt>
                                    <dd class="col-8 fw-semibold" id="e-emp-no">—</dd>
                                    <dt class="col-4 text-muted fw-normal">이름</dt>
                                    <dd class="col-8" id="e-emp-name">—</dd>
                                    <dt class="col-4 text-muted fw-normal">직위</dt>
                                    <dd class="col-8" id="e-position">—</dd>
                                    <dt class="col-4 text-muted fw-normal">부서</dt>
                                    <dd class="col-8" id="e-org">—</dd>
                                </dl>
                                <div class="form-text mt-1">직원 연동 정보는 이 화면에서 변경할 수 없습니다.</div>
                            </div>
                        </div>

                        <!-- 액션 버튼 -->
                        <div class="d-flex justify-content-between">
                            <button class="btn btn-outline-secondary" id="btn-cancel">
                                <i class="ti ti-x me-1"></i>취소
                            </button>
                            <button class="btn btn-primary" id="btn-save">
                                <i class="ti ti-device-floppy me-1"></i>저장
                            </button>
                        </div>

                    </div>
                </div>
            </div><!-- page-content -->

        </div>
        <th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
    </div>
</div>
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block>
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script th:src="@{/js/axios.min.js}"></script>
<script th:inline="javascript">
(function () {
    'use strict';

    const userId    = /*[[${userId}]]*/ '';
    const detailUrl = `/user/${userId}`;

    // ── 초기 데이터 로드 ───────────────────────────────────────────────
    Promise.all([
        axios.get(`/api/users/${userId}`),
        axios.get('/api/roles'),
        axios.get(`/api/users/${userId}/roles`)
    ])
    .then(([userRes, allRolesRes, userRolesRes]) => {
        init(userRes.data);
        renderRolesForm(allRolesRes.data, userRolesRes.data);
    })
    .catch(() => alert('데이터를 불러오지 못했습니다.'))
    .finally(() => {
        document.getElementById('page-loading').style.display = 'none';
        document.getElementById('page-content').style.display = '';
        document.getElementById('roles-loading').style.display = 'none';
        document.getElementById('roles-content').style.display = '';
    });

    function init(d) {
        document.getElementById('f-email').value  = d.email  || '';
        document.getElementById('f-name').value   = d.name   || '';
        document.getElementById('f-status').value = d.status || 'E';

        if (d.employeeId) {
            set('e-emp-no',   d.employeeNo   || '—');
            set('e-emp-name', d.employeeName || '—');
            set('e-position', d.position     || '—');
            set('e-org',      d.orgId        || '—');
            document.getElementById('emp-card').style.display = '';
        }
    }

    function renderRolesForm(allRoles, userRoles) {
        const list  = document.getElementById('roles-list');
        const empty = document.getElementById('roles-empty');
        list.innerHTML = '';

        if (!allRoles || allRoles.length === 0) {
            empty.style.display = '';
            return;
        }
        empty.style.display = 'none';

        const assignedIds = new Set((userRoles || []).map(r => r.id));
        allRoles.forEach(role => {
            const checked = assignedIds.has(role.id) ? ' checked' : '';
            const div = document.createElement('div');
            div.className = 'col-sm-6 col-md-4';
            div.innerHTML = `
                <div class="form-check">
                    <input class="form-check-input" type="checkbox"
                           id="role-cb-${esc(role.id)}" value="${esc(role.id)}"${checked}>
                    <label class="form-check-label" for="role-cb-${esc(role.id)}">
                        <span class="fw-medium">${esc(role.name)}</span>
                        ${role.remark ? `<small class="text-muted d-block">${esc(role.remark)}</small>` : ''}
                    </label>
                </div>`;
            list.appendChild(div);
        });
    }

    function collectRoleIds() {
        return Array.from(document.querySelectorAll('#roles-list input[type=checkbox]:checked'))
                    .map(cb => cb.value);
    }

    // ── 비밀번호 토글 ─────────────────────────────────────────────────
    document.getElementById('btn-toggle-pw').addEventListener('click', function () {
        const input = document.getElementById('f-new-pw');
        const icon  = this.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('ti-eye', 'ti-eye-off');
        } else {
            input.type = 'password';
            icon.classList.replace('ti-eye-off', 'ti-eye');
        }
    });

    // ── 비밀번호 일치 실시간 확인 ──────────────────────────────────────
    document.getElementById('f-confirm-pw').addEventListener('input', checkPw);
    document.getElementById('f-new-pw').addEventListener('input', checkPw);

    function checkPw() {
        const np  = document.getElementById('f-new-pw').value;
        const cp  = document.getElementById('f-confirm-pw').value;
        const msg = document.getElementById('pw-mismatch');
        msg.style.display = (np && cp && np !== cp) ? '' : 'none';
    }

    // ── 저장 ──────────────────────────────────────────────────────────
    document.getElementById('btn-save').addEventListener('click', () => {
        const newPw     = document.getElementById('f-new-pw').value;
        const confirmPw = document.getElementById('f-confirm-pw').value;

        if (newPw && newPw !== confirmPw) { alert('비밀번호가 일치하지 않습니다.'); return; }
        if (newPw && newPw.length < 8)    { alert('비밀번호는 8자 이상이어야 합니다.'); return; }

        const userPayload = {
            name:            document.getElementById('f-name').value.trim() || null,
            status:          document.getElementById('f-status').value,
            newPassword:     newPw     || null,
            confirmPassword: confirmPw || null
        };
        const roleIds = collectRoleIds();

        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...';

        Promise.all([
            axios.put(`/api/users/${userId}`, userPayload),
            axios.put(`/api/users/${userId}/roles`, { roleIds })
        ])
        .then(() => location.href = detailUrl)
        .catch(err => {
            const msg = err.response?.data?.message
                     || err.response?.data?.errors?.[0]?.defaultMessage
                     || '저장에 실패했습니다.';
            alert(msg);
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="ti ti-device-floppy me-1"></i>저장';
        });
    });

    // ── 취소 ──────────────────────────────────────────────────────────
    document.getElementById('btn-cancel').addEventListener('click', () => {
        location.href = detailUrl;
    });

    function set(id, val) {
        document.getElementById(id).textContent = val ?? '—';
    }
    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
})();
</script>
</th:block>

</html>
