<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shared/base(title=${'사용자 상세'})}">

<th:block layout:fragment="content">
<div class="wrapper">
    <th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block>
    <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>

    <div class="content-page">
        <div class="container-fluid">
            <th:block th:replace="~{shared/partials/page-title :: page-title(subtitle='사용자', title='사용자 상세')}"></th:block>

            <!-- 툴바 -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/user/list}">
                    <i class="ti ti-arrow-left me-1"></i>목록
                </a>
                <div class="d-flex gap-2">
                    <button th:if="${pagePermission?.write()}" class="btn btn-sm btn-outline-warning" id="btn-edit">
                        <i class="ti ti-pencil me-1"></i>수정
                    </button>
                    <button th:if="${pagePermission?.write()}" class="btn btn-sm btn-outline-danger" id="btn-delete">
                        <i class="ti ti-trash me-1"></i>삭제
                    </button>
                </div>
            </div>

            <!-- 로딩 -->
            <div id="page-loading" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>

            <!-- 상세 내용 -->
            <div id="page-content" style="display:none;">
                <div class="row g-3">

                    <!-- 계정 정보 -->
                    <div class="col-lg-5">
                        <div class="card h-100">
                            <div class="card-header">
                                <h5 class="card-title mb-0">
                                    <i class="ti ti-user me-1"></i>계정 정보
                                </h5>
                            </div>
                            <div class="card-body">
                                <dl class="row mb-0">
                                    <dt class="col-4 text-muted fw-normal">이메일</dt>
                                    <dd class="col-8 fw-semibold" id="d-email">—</dd>

                                    <dt class="col-4 text-muted fw-normal">이름</dt>
                                    <dd class="col-8" id="d-name">—</dd>

                                    <dt class="col-4 text-muted fw-normal">상태</dt>
                                    <dd class="col-8" id="d-status">—</dd>

                                    <dt class="col-4 text-muted fw-normal">등록일</dt>
                                    <dd class="col-8 text-muted" id="d-created">—</dd>
                                </dl>
                            </div>
                        </div>
                    </div>

                    <!-- 직원 정보 -->
                    <div class="col-lg-7">
                        <div class="card h-100">
                            <div class="card-header d-flex justify-content-between align-items-center">
                                <h5 class="card-title mb-0">
                                    <i class="ti ti-id-badge me-1"></i>직원 정보
                                </h5>
                                <span id="d-emp-badge"></span>
                            </div>

                            <!-- 직원 미연동 -->
                            <div id="emp-empty" class="card-body text-center text-muted py-5" style="display:none;">
                                <i class="ti ti-unlink fs-2 d-block mb-2"></i>
                                연결된 직원 정보가 없습니다.
                            </div>

                            <!-- 직원 연동 -->
                            <div id="emp-info" class="card-body" style="display:none;">
                                <div class="row g-2 align-items-start">
                                    <!-- 사진 -->
                                    <div class="col-auto">
                                        <img id="d-photo" src="" alt="photo"
                                             class="rounded-circle avatar-lg border"
                                             style="display:none; width:80px; height:80px; object-fit:cover;"/>
                                        <div id="d-photo-placeholder"
                                             class="rounded-circle bg-light d-flex align-items-center justify-content-center border"
                                             style="width:80px; height:80px;">
                                            <i class="ti ti-user fs-2 text-muted"></i>
                                        </div>
                                    </div>
                                    <div class="col">
                                        <dl class="row mb-0">
                                            <dt class="col-4 text-muted fw-normal">사번</dt>
                                            <dd class="col-8 fw-semibold" id="d-emp-no">—</dd>

                                            <dt class="col-4 text-muted fw-normal">이름</dt>
                                            <dd class="col-8" id="d-emp-name">—</dd>

                                            <dt class="col-4 text-muted fw-normal">직위</dt>
                                            <dd class="col-8" id="d-position">—</dd>

                                            <dt class="col-4 text-muted fw-normal">부서</dt>
                                            <dd class="col-8" id="d-org">—</dd>

                                            <dt class="col-4 text-muted fw-normal">휴대폰</dt>
                                            <dd class="col-8" id="d-mobile">—</dd>

                                            <dt class="col-4 text-muted fw-normal">전화</dt>
                                            <dd class="col-8" id="d-phone">—</dd>

                                            <dt class="col-4 text-muted fw-normal">업무 이메일</dt>
                                            <dd class="col-8" id="d-emp-email">—</dd>

                                            <dt class="col-4 text-muted fw-normal">입사일</dt>
                                            <dd class="col-8" id="d-start">—</dd>

                                            <dt class="col-4 text-muted fw-normal">퇴사일</dt>
                                            <dd class="col-8" id="d-end">—</dd>

                                            <dt class="col-4 text-muted fw-normal">재직 상태</dt>
                                            <dd class="col-8" id="d-emp-status">—</dd>
                                        </dl>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 부여된 역할 -->
                    <div class="col-12">
                        <div class="card">
                            <div class="card-header py-2">
                                <h5 class="card-title mb-0"><i class="ti ti-shield me-1"></i>부여된 역할</h5>
                            </div>
                            <div class="card-body">
                                <div id="roles-loading" class="text-center py-2">
                                    <div class="spinner-border spinner-border-sm text-primary"></div>
                                </div>
                                <div id="roles-content" style="display:none;">
                                    <div id="roles-badges" class="d-flex flex-wrap gap-2"></div>
                                    <p id="roles-empty" class="text-muted small mb-0" style="display:none;">
                                        부여된 역할이 없습니다.
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>

                </div><!-- row -->
            </div><!-- page-content -->

        </div>
        <th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
    </div>
</div>
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block>
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script th:src="@{/js/axios.min.js}"></script>
<script th:inline="javascript">
(function () {
    'use strict';

    const userId  = /*[[${userId}]]*/ '';
    const listUrl = /*[[@{/pages/user/list}]]*/ '/user/list';

    // ── 데이터 로드 ────────────────────────────────────────────────────
    Promise.all([
        axios.get(`/api/users/${userId}`),
        axios.get(`/api/users/${userId}/roles`)
    ])
    .then(([userRes, rolesRes]) => {
        render(userRes.data);
        renderRoles(rolesRes.data);
    })
    .catch(() => alert('데이터를 불러오지 못했습니다.'))
    .finally(() => {
        document.getElementById('page-loading').style.display = 'none';
        document.getElementById('page-content').style.display = '';
        document.getElementById('roles-loading').style.display = 'none';
        document.getElementById('roles-content').style.display = '';
    });

    function render(d) {
        set('d-email',   d.email);
        set('d-name',    d.displayName || '—');
        set('d-created', d.createdAt ? new Date(d.createdAt).toLocaleString('ko-KR') : '—');

        document.getElementById('d-status').innerHTML = d.status === 'E'
            ? '<span class="badge badge-soft-success">활성</span>'
            : '<span class="badge badge-soft-danger">비활성</span>';

        if (d.employeeId) {
            document.getElementById('d-emp-badge').innerHTML =
                '<span class="badge badge-soft-primary"><i class="ti ti-link me-1"></i>연동됨</span>';

            set('d-emp-no',    d.employeeNo    || '—');
            set('d-emp-name',  d.employeeName  || '—');
            set('d-position',  d.position      || '—');
            set('d-org',       d.orgId         || '—');
            set('d-mobile',    d.mobile        || '—');
            set('d-phone',     d.phone         || '—');
            set('d-emp-email', d.employeeEmail || '—');
            set('d-start',     fmt8(d.startDate));
            set('d-end',       d.endDate ? fmt8(d.endDate) : '재직 중');

            document.getElementById('d-emp-status').innerHTML = d.employeeStatus === 'E'
                ? '<span class="badge badge-soft-success">재직</span>'
                : '<span class="badge badge-soft-secondary">퇴직</span>';

            if (d.photo) {
                document.getElementById('d-photo').src = d.photo;
                document.getElementById('d-photo').style.display = '';
                document.getElementById('d-photo-placeholder').style.display = 'none';
            }

            document.getElementById('emp-info').style.display  = '';
            document.getElementById('emp-empty').style.display = 'none';
        } else {
            document.getElementById('emp-empty').style.display = '';
            document.getElementById('emp-info').style.display  = 'none';
        }
    }

    function renderRoles(roles) {
        const badges = document.getElementById('roles-badges');
        const empty  = document.getElementById('roles-empty');
        badges.innerHTML = '';

        if (!roles || roles.length === 0) {
            empty.style.display = '';
            return;
        }
        empty.style.display = 'none';
        roles.forEach(r => {
            const span = document.createElement('span');
            span.className = 'badge badge-soft-primary fs-sm py-1 px-2';
            span.innerHTML = `<i class="ti ti-shield me-1"></i>${esc(r.name)}`;
            if (r.remark) span.title = r.remark;
            badges.appendChild(span);
        });
    }

    // ── 수정 ──────────────────────────────────────────────────────────
    document.getElementById('btn-edit')?.addEventListener('click', () => {
        location.href = `/user/${userId}/edit`;
    });

    // ── 삭제 ──────────────────────────────────────────────────────────
    document.getElementById('btn-delete')?.addEventListener('click', () => {
        if (!confirm('해당 사용자를 비활성화(삭제)하시겠습니까?')) return;
        axios.delete(`/api/users/${userId}`)
            .then(() => location.href = listUrl)
            .catch(err => alert(err.response?.data?.message || '삭제에 실패했습니다.'));
    });

    // ── 유틸 ──────────────────────────────────────────────────────────
    function set(id, val) {
        document.getElementById(id).textContent = val ?? '—';
    }
    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function fmt8(s) {
        if (!s || s.length !== 8) return s || '—';
        return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}`;
    }
})();
</script>
</th:block>

</html>
