<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{shared/base(title=#{page.login.title})}">

<th:block layout:fragment="styles">
</th:block>

<th:block layout:fragment="content">
<div class="auth-box overflow-hidden align-items-center d-flex">
<div class="container">
<div class="row justify-content-center">
<div class="col-xxl-4 col-md-6 col-sm-8">
<div class="auth-brand text-center mb-4">
<a class="logo-dark" th:href="@{/}">
<img alt="dark logo" th:src="@{/images/logo-black.png}"/>
</a>
<a class="logo-light" th:href="@{/}">
<img alt="logo" th:src="@{/images/logo.png}"/>
</a>
<h4 class="fw-bold mt-3" th:text="#{page.login.welcome}">Welcome</h4>
<p class="text-muted w-lg-75 mx-auto" th:text="#{page.login.welcome.msg}">이메일과 암호를 입력해 주세요.</p>
</div>
<div class="card p-4">
<div id="login-error" class="alert alert-danger py-2 mb-3" style="display:none;"></div>
<div class="mb-3">
<label class="form-label" for="f-email">
    [[#{page.login.email}]]
<span class="text-danger">*</span>
</label>
<div class="input-group">
<input class="form-control" id="f-email" placeholder="you@example.com" type="email" autocomplete="email"/>
</div>
</div>
<div class="mb-3">
<label class="form-label" for="f-password">
    [[#{page.login.password}]]
<span class="text-danger">*</span>
</label>
<div class="input-group">
<input class="form-control" id="f-password" placeholder="••••••••" type="password" autocomplete="current-password"/>
<button class="btn btn-outline-secondary" type="button" id="btn-toggle-pw">
<i class="ti ti-eye"></i>
</button>
</div>
</div>
<div class="d-flex justify-content-between align-items-center mb-3">
<div class="form-check">
<input class="form-check-input form-check-input-light fs-14" id="rememberMe" type="checkbox"/>
<label class="form-check-label" for="rememberMe" th:text="#{page.login.keep}">로그인 유지</label>
</div>
    <a href="auth-reset-pass.html" class="text-decoration-underline link-offset-3 text-muted" th:text="#{page.login.forgot}">Forgot Password?</a>
</div>
<div class="d-grid">
<button class="btn btn-primary fw-semibold py-2" id="btn-login" type="button" th:text="#{page.login.submit}">로그인</button>
</div>

<p class="text-center text-muted mt-4 mb-0">
©
<script>document.write(new Date().getFullYear())</script>
Manager
</p>
</div>
</div>
</div>
</div>
</div>
<!-- end auth-fluid-->
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script>
(function () {
    'use strict';

    const params    = new URLSearchParams(location.search);
    const returnUrl = params.get('returnUrl') || '/pages/user/list';

    // ── 비밀번호 표시 토글 ─────────────────────────────────────────────
    document.getElementById('btn-toggle-pw').addEventListener('click', function () {
        const input = document.getElementById('f-password');
        const icon  = this.querySelector('i');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('ti-eye', 'ti-eye-off');
        } else {
            input.type = 'password';
            icon.classList.replace('ti-eye-off', 'ti-eye');
        }
    });

    // ── Enter 키 처리 ──────────────────────────────────────────────────
    document.getElementById('f-email').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') document.getElementById('f-password').focus();
    });
    document.getElementById('f-password').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') doLogin();
    });

    document.getElementById('btn-login').addEventListener('click', doLogin);

    // ── 로그인 처리 ────────────────────────────────────────────────────
    function doLogin() {
        const email    = document.getElementById('f-email').value.trim();
        const password = document.getElementById('f-password').value;

        if (!email || !password) {
            showError('이메일과 비밀번호를 입력하세요.');
            return;
        }

        const btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>로그인 중...';
        hideError();

        axios.post('/api/auth/login', { email, password })
            .then(function (res) {
                const token = res.data.accessToken;
                localStorage.setItem('auth_token', token);
                localStorage.setItem('user_id', res.data.userId);
                localStorage.setItem('password_change_required', String(res.data.passwordChangeRequired));
                document.cookie = 'auth_token=' + token + '; path=/; SameSite=Strict';
                location.href = res.data.passwordChangeRequired ? '/change-password' : returnUrl;
            })
            .catch(function (err) {
                const msg = err.response?.data?.message || '이메일 또는 비밀번호를 확인하세요.';
                showError(msg);
            })
            .finally(function () {
                btn.disabled = false;
                btn.innerHTML = '로그인';
            });
    }

    function showError(msg) {
        const el = document.getElementById('login-error');
        el.textContent = msg;
        el.style.display = '';
    }
    function hideError() {
        document.getElementById('login-error').style.display = 'none';
    }
})();
</script>
</th:block>

</html>
