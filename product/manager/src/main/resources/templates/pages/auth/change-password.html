<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shared/base(title='비밀번호 변경')}">

<th:block layout:fragment="content">
<div class="wrapper">
    <th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block>
    <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>

    <div class="content-page">
        <div class="container-fluid">

            <div class="row justify-content-center mt-4">
                <div class="col-lg-5 col-md-7">

                    <div class="card">
                        <div class="card-header">
                            <h5 class="card-title mb-0">
                                <i class="ti ti-lock me-1"></i>비밀번호 변경
                            </h5>
                        </div>
                        <div class="card-body">

                            <div class="alert alert-warning py-2 mb-3">
                                <i class="ti ti-alert-triangle me-1"></i>
                                임시 비밀번호로 로그인하셨습니다. 새 비밀번호를 설정해 주세요.
                            </div>

                            <div id="change-error" class="alert alert-danger py-2 mb-3" style="display:none;"></div>

                            <div class="mb-3">
                                <label class="form-label" for="f-new-password">
                                    새 비밀번호 <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input class="form-control" id="f-new-password" type="password"
                                           placeholder="8자 이상 입력하세요" autocomplete="new-password"/>
                                    <button class="btn btn-outline-secondary" type="button" id="btn-toggle-new">
                                        <i class="ti ti-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label" for="f-confirm-password">
                                    비밀번호 확인 <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <input class="form-control" id="f-confirm-password" type="password"
                                           placeholder="비밀번호를 다시 입력하세요" autocomplete="new-password"/>
                                    <button class="btn btn-outline-secondary" type="button" id="btn-toggle-confirm">
                                        <i class="ti ti-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="d-grid">
                                <button class="btn btn-primary fw-semibold" id="btn-change">
                                    <i class="ti ti-device-floppy me-1"></i>비밀번호 변경
                                </button>
                            </div>

                        </div>
                    </div>

                </div>
            </div>

        </div>
        <th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
    </div>
</div>
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block>
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script>
(function () {
    'use strict';

    function togglePw(inputId, btnId) {
        document.getElementById(btnId).addEventListener('click', function () {
            var input = document.getElementById(inputId);
            var icon  = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('ti-eye', 'ti-eye-off');
            } else {
                input.type = 'password';
                icon.classList.replace('ti-eye-off', 'ti-eye');
            }
        });
    }
    togglePw('f-new-password',     'btn-toggle-new');
    togglePw('f-confirm-password', 'btn-toggle-confirm');

    document.getElementById('btn-change').addEventListener('click', function () {
        var newPw     = document.getElementById('f-new-password').value;
        var confirmPw = document.getElementById('f-confirm-password').value;

        if (!newPw) { showError('새 비밀번호를 입력하세요.'); return; }
        if (newPw.length < 8) { showError('비밀번호는 8자 이상이어야 합니다.'); return; }
        if (newPw !== confirmPw) { showError('비밀번호가 일치하지 않습니다.'); return; }

        var btn = document.getElementById('btn-change');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>변경 중...';
        hideError();

        axios.put('/api/auth/change-password', { newPassword: newPw, confirmPassword: confirmPw })
            .then(function () {
                localStorage.setItem('password_change_required', 'false');
                location.href = '/user/list';
            })
            .catch(function (err) {
                showError(err.response?.data?.message || '비밀번호 변경에 실패했습니다.');
            })
            .finally(function () {
                btn.disabled = false;
                btn.innerHTML = '<i class="ti ti-device-floppy me-1"></i>비밀번호 변경';
            });
    });

    function showError(msg) {
        var el = document.getElementById('change-error');
        el.textContent = msg;
        el.style.display = '';
    }
    function hideError() {
        document.getElementById('change-error').style.display = 'none';
    }
})();
</script>
</th:block>

</html>
