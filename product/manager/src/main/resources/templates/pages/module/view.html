<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shared/base(title=${'모듈 상세'})}">

<th:block layout:fragment="content">
<div class="wrapper">
    <th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block>
    <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>

    <div class="content-page">
        <div class="container-fluid">
            <th:block th:replace="~{shared/partials/page-title :: page-title(subtitle='모듈', title='모듈 상세')}"></th:block>

            <!-- 툴바 -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/module/list}">
                    <i class="ti ti-arrow-left me-1"></i>목록
                </a>
                <div class="d-flex gap-2">
                    <button th:if="${pagePermission?.write()}" class="btn btn-sm btn-outline-warning" id="btn-edit" type="button">
                        <i class="ti ti-pencil me-1"></i>수정
                    </button>
                    <button th:if="${pagePermission?.write()}" class="btn btn-sm btn-outline-danger" id="btn-delete" type="button">
                        <i class="ti ti-trash me-1"></i>삭제
                    </button>
                </div>
            </div>

            <!-- 로딩 -->
            <div id="page-loading" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>

            <!-- 상세 내용 -->
            <div id="page-content" style="display:none;">

                <!-- 모듈 기본 정보 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0"><i class="ti ti-puzzle me-1"></i>모듈 정보</h5>
                    </div>
                    <div class="card-body">
                        <dl class="row mb-0">
                            <dt class="col-sm-3 col-lg-2 text-muted fw-normal">모듈명</dt>
                            <dd class="col-sm-9 col-lg-10 fw-semibold" id="d-name">—</dd>

                            <dt class="col-sm-3 col-lg-2 text-muted fw-normal">URL</dt>
                            <dd class="col-sm-9 col-lg-10" id="d-url">—</dd>

                            <dt class="col-sm-3 col-lg-2 text-muted fw-normal">아이콘</dt>
                            <dd class="col-sm-9 col-lg-10" id="d-icon">—</dd>

                            <dt class="col-sm-3 col-lg-2 text-muted fw-normal">순서</dt>
                            <dd class="col-sm-9 col-lg-10" id="d-seq">—</dd>

                            <dt class="col-sm-3 col-lg-2 text-muted fw-normal">비고</dt>
                            <dd class="col-sm-9 col-lg-10" id="d-remark">—</dd>

                            <dt class="col-sm-3 col-lg-2 text-muted fw-normal">상태</dt>
                            <dd class="col-sm-9 col-lg-10" id="d-status">—</dd>

                            <dt class="col-sm-3 col-lg-2 text-muted fw-normal">등록일</dt>
                            <dd class="col-sm-9 col-lg-10 text-muted" id="d-reg-date">—</dd>

                            <dt class="col-sm-3 col-lg-2 text-muted fw-normal mb-0">수정일</dt>
                            <dd class="col-sm-9 col-lg-10 text-muted mb-0" id="d-upt-date">—</dd>
                        </dl>
                    </div>
                </div>

                <!-- 모듈 메뉴 -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0"><i class="ti ti-menu-2 me-1"></i>모듈 메뉴</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm align-middle mb-0">
                                <thead class="table-light text-uppercase fs-xxs">
                                    <tr>
                                        <th style="width:80px">순서</th>
                                        <th>메뉴명</th>
                                        <th style="width:25%">URL</th>
                                        <th style="width:20%">아이콘</th>
                                        <th style="width:90px">상태</th>
                                    </tr>
                                </thead>
                                <tbody id="menu-tbody"></tbody>
                            </table>
                        </div>
                        <div id="menu-empty" class="text-center py-3 text-muted small" style="display:none;">
                            등록된 메뉴가 없습니다.
                        </div>
                    </div>
                </div>

            </div><!-- /page-content -->

        </div>
        <th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
    </div>
</div>
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block>
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script th:src="@{/js/axios.min.js}"></script>
<script th:inline="javascript">
(function () {
    'use strict';

    const moduleId = /*[[${moduleId}]]*/ '';
    const listUrl  = /*[[@{/module/list}]]*/ '/module/list';

    // ── 데이터 로드 ────────────────────────────────────────────────────
    axios.get(`/api/modules/${moduleId}`)
        .then(res => render(res.data))
        .catch(() => alert('모듈 정보를 불러오지 못했습니다.'))
        .finally(() => {
            document.getElementById('page-loading').style.display = 'none';
            document.getElementById('page-content').style.display = '';
        });

    function render(d) {
        set('d-name',   d.name);
        set('d-url',    d.url    || '—');
        set('d-seq',    d.seq    != null ? d.seq : '—');
        set('d-remark', d.remark || '—');

        const iconEl = document.getElementById('d-icon');
        if (d.icon) {
            iconEl.innerHTML = `<i class="${esc(d.icon)}"></i><span class="ms-2 text-muted small">${esc(d.icon)}</span>`;
        } else {
            iconEl.textContent = '—';
        }

        document.getElementById('d-status').innerHTML = d.status === 'E'
            ? '<span class="badge badge-soft-success">활성</span>'
            : '<span class="badge badge-soft-danger">비활성</span>';

        set('d-reg-date', fmtDate(d.regDate));
        set('d-upt-date', fmtDate(d.uptDate));

        renderMenus(d.menus || []);
    }

    function renderMenus(menus) {
        const tbody = document.getElementById('menu-tbody');
        const empty = document.getElementById('menu-empty');
        tbody.innerHTML = '';

        if (menus.length === 0) {
            empty.style.display = '';
            return;
        }
        empty.style.display = 'none';

        menus.forEach(m => {
            const tr = document.createElement('tr');
            const iconHtml = m.icon
                ? `<i class="${esc(m.icon)}"></i><span class="ms-1 text-muted small">${esc(m.icon)}</span>`
                : '—';
            const badge = m.status === 'E'
                ? '<span class="badge badge-soft-success">활성</span>'
                : '<span class="badge badge-soft-danger">비활성</span>';
            tr.innerHTML = `
                <td>${m.seq ?? '—'}</td>
                <td class="fw-medium">${esc(m.name)}</td>
                <td class="text-muted">${esc(m.url) || '—'}</td>
                <td>${iconHtml}</td>
                <td>${badge}</td>`;
            tbody.appendChild(tr);
        });
    }

    // ── 버튼 이벤트 ───────────────────────────────────────────────────
    document.getElementById('btn-edit')?.addEventListener('click', () => {
        location.href = `/module/${moduleId}/edit`;
    });

    document.getElementById('btn-delete')?.addEventListener('click', () => {
        if (!confirm('해당 모듈을 비활성화(삭제)하시겠습니까?')) return;
        axios.delete(`/api/modules/${moduleId}`)
            .then(() => location.href = listUrl)
            .catch(err => alert(err.response?.data?.message || '삭제에 실패했습니다.'));
    });

    // ── 유틸 ──────────────────────────────────────────────────────────
    function set(id, val) {
        document.getElementById(id).textContent = val ?? '—';
    }

    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtDate(s) {
        if (!s || s.length < 8) return s || '—';
        const d = s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8);
        return s.length >= 14
            ? d + ' ' + s.slice(8,10) + ':' + s.slice(10,12) + ':' + s.slice(12,14)
            : d;
    }
})();
</script>
</th:block>

</html>
