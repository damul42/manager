<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shared/base(title=${'모듈 수정'})}">

<th:block layout:fragment="content">
<div class="wrapper">
    <th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block>
    <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>

    <div class="content-page">
        <div class="container-fluid">
            <th:block th:replace="~{shared/partials/page-title :: page-title(subtitle='모듈', title='모듈 수정')}"></th:block>

            <!-- 툴바 -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a class="btn btn-sm btn-outline-secondary" id="btn-back">
                    <i class="ti ti-arrow-left me-1"></i>상세
                </a>
                <button class="btn btn-sm btn-outline-danger" id="btn-delete" type="button">
                    <i class="ti ti-trash me-1"></i>삭제
                </button>
            </div>

            <!-- 로딩 -->
            <div id="page-loading" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>

            <!-- 편집 영역 -->
            <div id="page-content" style="display:none;">

                <!-- 모듈 기본 정보 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0"><i class="ti ti-puzzle me-1"></i>모듈 정보</h5>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="f-name">모듈명 <span class="text-danger">*</span></label>
                                <input class="form-control" id="f-name" type="text" placeholder="모듈명을 입력하세요."/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="f-url">URL</label>
                                <input class="form-control" id="f-url" type="text" placeholder="예: /module"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="f-icon">아이콘</label>
                                <input class="form-control" id="f-icon" type="text" placeholder="예: ti ti-home"/>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" for="f-seq">순서</label>
                                <input class="form-control" id="f-seq" type="number" placeholder="숫자"/>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label" for="f-status">상태</label>
                                <select class="form-select" id="f-status">
                                    <option value="E">활성</option>
                                    <option value="D">비활성</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="f-remark">비고</label>
                                <textarea class="form-control" id="f-remark" rows="2" placeholder="비고를 입력하세요."></textarea>
                            </div>
                        </div>

                        <!-- 등록/수정 메타 -->
                        <div class="row mt-3 pt-3 border-top g-2 text-muted small">
                            <div class="col-md-6">등록일: <span id="d-reg-date">—</span></div>
                            <div class="col-md-6">수정일: <span id="d-upt-date">—</span></div>
                        </div>
                    </div>
                </div>

                <!-- 모듈 메뉴 -->
                <div class="card mb-4">
                    <div class="card-header py-2 d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0"><i class="ti ti-menu-2 me-1"></i>모듈 메뉴</h5>
                        <button class="btn btn-sm btn-outline-primary lh-1" id="btn-add-menu" type="button">
                            <i class="ti ti-plus me-1"></i>메뉴 추가
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-sm align-middle mb-0">
                                <thead class="table-light text-uppercase fs-xxs">
                                    <tr>
                                        <th style="width:80px">순서</th>
                                        <th>메뉴명 <span class="text-danger">*</span></th>
                                        <th style="width:22%">URL</th>
                                        <th style="width:18%">아이콘</th>
                                        <th style="width:90px">상태</th>
                                        <th style="width:50px" class="text-center">삭제</th>
                                    </tr>
                                </thead>
                                <tbody id="menu-tbody"></tbody>
                            </table>
                        </div>
                        <div id="menu-empty" class="text-center py-3 text-muted small">
                            메뉴 항목이 없습니다. 위 버튼으로 추가하세요.
                        </div>
                    </div>
                </div>

                <!-- 저장/취소 버튼 -->
                <div class="d-flex justify-content-between">
                    <button class="btn btn-outline-secondary" id="btn-cancel" type="button">
                        <i class="ti ti-x me-1"></i>취소
                    </button>
                    <button class="btn btn-primary" id="btn-save" type="button">
                        <i class="ti ti-device-floppy me-1"></i>저장
                    </button>
                </div>

            </div><!-- /page-content -->

        </div>
        <th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
    </div>
</div>
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block>
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script th:src="@{/js/axios.min.js}"></script>
<script th:inline="javascript">
(function () {
    'use strict';

    const moduleId = /*[[${moduleId}]]*/ '';

    document.getElementById('btn-back').href   = `/module/${moduleId}`;
    document.getElementById('btn-cancel').addEventListener('click', () => location.href = `/module/${moduleId}`);

    // ── 데이터 로드 ────────────────────────────────────────────────────
    axios.get(`/api/modules/${moduleId}`)
        .then(res => populate(res.data))
        .catch(() => alert('모듈 정보를 불러오지 못했습니다.'))
        .finally(() => {
            document.getElementById('page-loading').style.display = 'none';
            document.getElementById('page-content').style.display = '';
        });

    function populate(d) {
        document.getElementById('f-name').value   = d.name   || '';
        document.getElementById('f-url').value    = d.url    || '';
        document.getElementById('f-icon').value   = d.icon   || '';
        document.getElementById('f-seq').value    = d.seq    != null ? d.seq : '';
        document.getElementById('f-remark').value = d.remark || '';
        document.getElementById('f-status').value = d.status || 'E';
        document.getElementById('d-reg-date').textContent = fmtDate(d.regDate);
        document.getElementById('d-upt-date').textContent = fmtDate(d.uptDate);
        (d.menus || []).forEach(m => addMenuRow(m));
        syncEmpty();
    }

    // ── 메뉴 행 관리 ──────────────────────────────────────────────────
    function addMenuRow(menu) {
        menu = menu || {};
        const tr = document.createElement('tr');
        tr.dataset.menuId = menu.id || '';
        tr.innerHTML = `
            <td><input type="number" name="seq" class="form-control form-control-sm"
                       value="${esc(menu.seq ?? '')}" placeholder="#"></td>
            <td><input type="text" name="name" class="form-control form-control-sm"
                       value="${esc(menu.name ?? '')}" placeholder="메뉴명" required></td>
            <td><input type="text" name="url" class="form-control form-control-sm"
                       value="${esc(menu.url ?? '')}" placeholder="/path"></td>
            <td><input type="text" name="icon" class="form-control form-control-sm"
                       value="${esc(menu.icon ?? '')}" placeholder="ti ti-..."></td>
            <td>
                <select name="status" class="form-select form-select-sm">
                    <option value="E"${!menu.status || menu.status === 'E' ? ' selected' : ''}>활성</option>
                    <option value="D"${menu.status === 'D' ? ' selected' : ''}>비활성</option>
                </select>
            </td>
            <td class="text-center">
                <button type="button" class="btn btn-icon btn-sm btn-outline-danger"
                        onclick="removeRow(this)">
                    <i class="ti ti-trash fs-sm"></i>
                </button>
            </td>`;
        document.getElementById('menu-tbody').appendChild(tr);
    }

    window.removeRow = function(btn) {
        btn.closest('tr').remove();
        syncEmpty();
    };

    function syncEmpty() {
        const hasRows = document.getElementById('menu-tbody').rows.length > 0;
        document.getElementById('menu-empty').style.display = hasRows ? 'none' : '';
    }

    function collectMenus() {
        return Array.from(document.querySelectorAll('#menu-tbody tr')).map(tr => ({
            id:     tr.dataset.menuId || null,
            seq:    parseInt(tr.querySelector('[name=seq]').value) || null,
            name:   tr.querySelector('[name=name]').value.trim(),
            icon:   tr.querySelector('[name=icon]').value.trim()   || null,
            url:    tr.querySelector('[name=url]').value.trim()    || null,
            status: tr.querySelector('[name=status]').value
        }));
    }

    // ── 저장 ──────────────────────────────────────────────────────────
    document.getElementById('btn-save').addEventListener('click', () => {
        const name   = document.getElementById('f-name').value.trim();
        const url    = document.getElementById('f-url').value.trim()    || null;
        const icon   = document.getElementById('f-icon').value.trim()   || null;
        const seqVal = document.getElementById('f-seq').value.trim();
        const seq    = seqVal ? parseInt(seqVal, 10) : null;
        const remark = document.getElementById('f-remark').value.trim() || null;
        const status = document.getElementById('f-status').value;
        const menus  = collectMenus();

        if (!name) { alert('모듈명을 입력하세요.'); return; }

        const invalidMenu = menus.find(m => !m.name);
        if (invalidMenu) { alert('메뉴명을 모두 입력하세요.'); return; }

        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>저장 중...';

        axios.put(`/api/modules/${moduleId}`, { name, remark, status, seq, icon, url, menus })
            .then(res => {
                document.getElementById('d-upt-date').textContent = fmtDate(res.data.uptDate);
                alert('저장되었습니다.');
            })
            .catch(err => {
                const msg = err.response?.data?.message
                         || err.response?.data?.errors?.[0]?.defaultMessage
                         || '저장에 실패했습니다.';
                alert(msg);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="ti ti-device-floppy me-1"></i>저장';
            });
    });

    // ── 삭제 ──────────────────────────────────────────────────────────
    document.getElementById('btn-delete').addEventListener('click', () => {
        if (!confirm('해당 모듈을 비활성화(삭제)하시겠습니까?')) return;
        axios.delete(`/api/modules/${moduleId}`)
            .then(() => location.href = '/module/list')
            .catch(err => alert(err.response?.data?.message || '삭제에 실패했습니다.'));
    });

    document.getElementById('btn-add-menu').addEventListener('click', () => {
        addMenuRow({});
        syncEmpty();
    });

    // ── 유틸 ──────────────────────────────────────────────────────────
    function esc(s) {
        return String(s == null ? '' : s)
            .replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function fmtDate(s) {
        if (!s || s.length < 8) return s || '—';
        const d = s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8);
        return s.length >= 14
            ? d + ' ' + s.slice(8,10) + ':' + s.slice(10,12) + ':' + s.slice(12,14)
            : d;
    }
})();
</script>
</th:block>

</html>
