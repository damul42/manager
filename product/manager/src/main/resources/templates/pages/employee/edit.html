<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{shared/base(title=#{page.employee.edit.title})}">

<th:block layout:fragment="content">
<div class="wrapper">
    <th:block th:replace="~{shared/partials/topbar :: topbar}"></th:block>
    <th:block th:replace="~{shared/partials/sidenav :: sidenav}"></th:block>

    <div class="content-page">
        <div class="container-fluid">
            <th:block th:replace="~{shared/partials/page-title :: page-title(subtitle=#{page.employee.subtitle}, title=#{page.employee.edit.title})}"></th:block>

            <!-- 툴바 -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <a class="btn btn-sm btn-outline-secondary" id="btn-back">
                    <i class="ti ti-arrow-left me-1"></i><span th:text="#{page.employee.detail.title}">상세</span>
                </a>
                <button class="btn btn-sm btn-outline-danger" id="btn-delete">
                    <i class="ti ti-trash me-1"></i><span th:text="#{btn.delete}">삭제</span>
                </button>
            </div>

            <!-- 로딩 -->
            <div id="page-loading" class="text-center py-5">
                <div class="spinner-border text-primary"></div>
            </div>

            <div id="page-content" style="display:none;">
                <div class="row justify-content-center">
                    <div class="col-lg-8">

                        <div class="card mb-3">
                            <div class="card-header">
                                <h5 class="card-title mb-0"><i class="ti ti-id-badge me-1"></i>기본 정보</h5>
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label text-muted">
                                            <span th:text="#{col.emp.employeeNo}">사번</span> (변경 불가)
                                        </label>
                                        <input class="form-control bg-light" id="d-emp-no" type="text" readonly/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label" for="f-name">
                                            <span th:text="#{col.emp.name}">이름</span>
                                            <span class="text-danger">*</span>
                                        </label>
                                        <input class="form-control" id="f-name" type="text"/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label" for="f-status" th:text="#{col.emp.status}">재직상태</label>
                                        <select class="form-select" id="f-status">
                                            <option value="E" th:text="#{emp.status.working}">재직</option>
                                            <option value="D" th:text="#{emp.status.resigned}">퇴직</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="f-org" th:text="#{col.emp.orgId}">부서</label>
                                        <input class="form-control" id="f-org" type="text"/>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="f-position" th:text="#{col.emp.position}">직위</label>
                                        <input class="form-control" id="f-position" type="text"/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label text-muted">
                                            <span th:text="#{col.emp.startDate}">입사일</span> (변경 불가)
                                        </label>
                                        <input class="form-control bg-light" id="d-start-date" type="text" readonly/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label" for="f-end-date" th:text="#{col.emp.endDate}">퇴사일</label>
                                        <input class="form-control" id="f-end-date" type="text"
                                               placeholder="YYYYMMDD" maxlength="8"/>
                                    </div>
                                </div>

                                <div class="row mt-3 pt-3 border-top g-2 text-muted small">
                                    <div class="col-md-6">등록일: <span id="d-reg-date">—</span></div>
                                    <div class="col-md-6">수정일: <span id="d-upt-date">—</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="card mb-3">
                            <div class="card-header">
                                <h5 class="card-title mb-0"><i class="ti ti-phone me-1"></i>연락처</h5>
                            </div>
                            <div class="card-body">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label" for="f-mobile" th:text="#{col.emp.mobile}">휴대폰</label>
                                        <input class="form-control" id="f-mobile" type="text"/>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label" for="f-phone" th:text="#{col.emp.phone}">전화</label>
                                        <input class="form-control" id="f-phone" type="text"/>
                                    </div>
                                    <div class="col-md-8">
                                        <label class="form-label" for="f-email" th:text="#{col.emp.email}">업무이메일</label>
                                        <input class="form-control" id="f-email" type="email"/>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 액션 버튼 -->
                        <div class="d-flex justify-content-between">
                            <button class="btn btn-outline-secondary" id="btn-cancel">
                                <i class="ti ti-x me-1"></i><span th:text="#{btn.cancel}">취소</span>
                            </button>
                            <button class="btn btn-primary" id="btn-save">
                                <i class="ti ti-device-floppy me-1"></i><span th:text="#{btn.save}">저장</span>
                            </button>
                        </div>

                    </div>
                </div>
            </div>

        </div>
        <th:block th:replace="~{shared/partials/footer :: footer}"></th:block>
    </div>
</div>
<th:block th:replace="~{shared/partials/customizer :: customizer}"></th:block>
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script th:inline="javascript">
(function () {
    'use strict';

    const employeeId = /*[[${employeeId}]]*/ '';
    const MSG        = /*[[${messages}]]*/ {};

    document.getElementById('btn-back').href = `/employee/${employeeId}`;
    document.getElementById('btn-cancel').addEventListener('click', () => {
        location.href = `/employee/${employeeId}`;
    });

    // ── 데이터 로드 ────────────────────────────────────────────────────
    axios.get(`/api/employees/${employeeId}`)
        .then(res => populate(res.data))
        .catch(() => alert(MSG['msg.emp.detailError'] || '직원 정보를 불러오지 못했습니다.'))
        .finally(() => {
            document.getElementById('page-loading').style.display = 'none';
            document.getElementById('page-content').style.display = '';
        });

    function populate(d) {
        document.getElementById('d-emp-no').value       = d.employeeNo || '';
        document.getElementById('f-name').value         = d.name       || '';
        document.getElementById('f-status').value       = d.status     || 'E';
        document.getElementById('f-org').value          = d.orgId      || '';
        document.getElementById('f-position').value     = d.position   || '';
        document.getElementById('d-start-date').value   = fmt8(d.startDate);
        document.getElementById('f-end-date').value     = d.endDate    || '';
        document.getElementById('f-mobile').value       = d.mobile     || '';
        document.getElementById('f-phone').value        = d.phone      || '';
        document.getElementById('f-email').value        = d.email      || '';
        document.getElementById('d-reg-date').textContent = fmtTs(d.regDate);
        document.getElementById('d-upt-date').textContent = fmtTs(d.uptDate);
    }

    // ── 저장 ──────────────────────────────────────────────────────────
    document.getElementById('btn-save').addEventListener('click', () => {
        const name    = document.getElementById('f-name').value.trim();
        const endDate = document.getElementById('f-end-date').value.trim();

        if (!name) { alert(MSG['msg.emp.nameRequired'] || '이름을 입력하세요.'); return; }
        if (endDate && !/^\d{8}$/.test(endDate)) {
            alert(MSG['msg.emp.endDateFormat'] || '퇴사일은 YYYYMMDD 형식이어야 합니다.');
            return;
        }

        const payload = {
            name,
            orgId:    document.getElementById('f-org').value.trim()      || null,
            position: document.getElementById('f-position').value.trim() || null,
            mobile:   document.getElementById('f-mobile').value.trim()   || null,
            phone:    document.getElementById('f-phone').value.trim()    || null,
            email:    document.getElementById('f-email').value.trim()    || null,
            endDate:  endDate || null,
            status:   document.getElementById('f-status').value
        };

        const btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>' + (MSG['loading.saving'] || '저장 중...');

        axios.put(`/api/employees/${employeeId}`, payload)
            .then(res => {
                document.getElementById('d-upt-date').textContent = fmtTs(res.data.uptDate);
                location.href = `/employee/${employeeId}`;
            })
            .catch(err => {
                const msg = err.response?.data?.message
                         || err.response?.data?.errors?.[0]?.defaultMessage
                         || MSG['msg.saveError'] || '저장에 실패했습니다.';
                alert(msg);
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerHTML = '<i class="ti ti-device-floppy me-1"></i>' + (MSG['btn.save'] || '저장');
            });
    });

    // ── 삭제 ──────────────────────────────────────────────────────────
    document.getElementById('btn-delete').addEventListener('click', () => {
        if (!confirm(MSG['msg.emp.deleteConfirm'] || '해당 직원을 퇴직 처리하시겠습니까?')) return;
        axios.delete(`/api/employees/${employeeId}`)
            .then(() => location.href = '/employee/list')
            .catch(err => alert(err.response?.data?.message || MSG['msg.deleteError'] || '처리에 실패했습니다.'));
    });

    function fmt8(s) {
        if (!s || s.length !== 8) return s || '';
        return s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8);
    }
    function fmtTs(s) {
        if (!s || s.length < 8) return s || '—';
        const d = s.slice(0,4) + '-' + s.slice(4,6) + '-' + s.slice(6,8);
        return s.length >= 14
            ? d + ' ' + s.slice(8,10) + ':' + s.slice(10,12) + ':' + s.slice(12,14)
            : d;
    }
})();
</script>
</th:block>

</html>
