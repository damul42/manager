<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{shared/base(title=${'Delete Account'})}" >

<th:block layout:fragment="styles">

</th:block>

<th:block layout:fragment="content">
<div class="auth-box overflow-hidden align-items-center d-flex">
<div class="container">
<div class="row justify-content-center">
<div class="col-xxl-4 col-md-6 col-sm-8">
<div class="auth-brand text-center mb-4">
<a class="logo-dark" th:href="@{/}">
<img alt="dark logo" th:src="@{/images/logo-black.png}"/>
</a>
<a class="logo-light" th:href="@{/}">
<img alt="logo" th:src="@{/images/logo.png}"/>
</a>
</div>
<div class="card p-4">
<div class="mb-4">
<div class="avatar-xxl mx-auto mt-2">
<div class="avatar-title bg-light-subtle border border-light border-dashed rounded-circle">
<img alt="dark logo" height="64" th:src="@{/images/delete.png}"/>
</div>
</div>
</div>
<h4 class="fw-bold text-center mb-3">Account Deactivated</h4>
<p class="text-muted text-center mb-4">Your account is currently inactive. Reactivate now to regain access to all features and opportunities.</p>
<div class="d-grid">
<button class="btn btn-primary fw-semibold py-2" type="submit">Reactivate Now</button>
</div>
</div>
<p class="text-center text-muted mt-4 mb-0">
                            ©
                            
                            Inspinia — by
                            <span class="fw-bold">WebAppLayers</span>
</p>
</div>
</div>
</div>
</div>
<!-- end auth-fluid-->
<th:block th:replace="~{shared/partials/footer-scripts :: footer-scripts}"></th:block>
</th:block>

<th:block layout:fragment="scripts">
<script>
                                document.write(new Date().getFullYear())
                            </script>
</th:block>

</html>
