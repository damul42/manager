services:
  postgres:
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=manager'
      - 'POSTGRES_PASSWORD=manager'
      - 'POSTGRES_USER=manager'
    ports:
      - '5432:5432'
  kafka:
    image: confluentinc/cp-kafka:latest
    ports:
      - "9092:9092"   # 내 PC(호스트)에서 Spring이나 콘솔로 접속할 때 쓰는 포트
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'

      # 1. 컨테이너가 실제로 리스닝(바인딩)할 포트 정의
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093'

      # 2. 클라이언트(앱, UI)들에게 "이 주소로 나한테 접속해"라고 광고(Advertise)할 주소
      # 내부 도커끼리는 kafka:29092 / 내 PC에서는 localhost:9092로 접속하라고 안내함
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'

      # 3. 프로토콜 이름 매핑
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT'

      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'ciWo7IWazngRchmPES6q5A=='
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "9090:9090"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # ⭐️ 중요: 동일한 도커 네트워크 안에서 kafka 컨테이너를 바라볼 때는 29092 포트를 찌릅니다.
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  redis:
    image: redis:latest
    container_name: redis-local
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: [ "redis-server", "--appendonly", "yes" ]

volumes:
  redis_data: